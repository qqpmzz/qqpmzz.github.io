<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QPMZ Blog</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">
                <a href="/">QPMZ Blog</a>
            </h1>
            <nav class="nav">
                <a href="/" class="nav-link active">홈</a>
                <a href="/about.html" class="nav-link">소개</a>
                <a href="/archive.html" class="nav-link">아카이브</a>
            </nav>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="hero">
                <h2>안녕하세요! 👋</h2>
                <p>마크다운으로 작성하는 개발 블로그입니다.</p>
            </section>

            <section class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="검색..." id="searchInput">
                </div>
            </section>

            <section class="posts-section">
                <h3>최근 포스트</h3>
                <div class="posts-grid" id="postsGrid">
                    <!-- 포스트들이 여기에 동적으로 추가됩니다 -->
                </div>
            </section>

            <section class="categories-section">
                <h3>카테고리</h3>
                <div class="categories" id="categories">
                    <!-- 카테고리들이 여기에 동적으로 추가됩니다 -->
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 QPMZ Blog. Made with ❤️</p>
            <div class="social-links">
                <a href="https://github.com/qqpmzz" target="_blank">
                    <i class="fab fa-github"></i>
                </a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
